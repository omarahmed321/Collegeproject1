<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Cart</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- this is the nav bar -->
    <div class="beforeNav"></div>
    
       <header class="nav">
      <div class="header-left">
        <button id="hamburger" class="noback-btn" onclick="appear()">≡</button>

        <img class="nav-img" src="resources for home page/logo.png" />
      </div>
     
        <input
          type="text"
          class="search-bar"
          placeholder="Search products brands and categories"
        />
     
      <div class="header-right">
            <div class="toggle-switch" >
  <label class="switch-label"  >
    <input type="checkbox" class="checkbox" onclick="toggle()" >
    <span class="slider" ></span>
  </label>
</div> 
        <button class="general-btn">Sign in/Up</button>
        <button class="general-btn">Account</button>
        <button class="cartBtn" ><a href="cart.html"><img src="resources for home page/shopping-cart.png" alt=""></a></button>
      </div>
    </header>
    <!-- ----------------------------------------------------- -->
    <!-- this is the modal  -->
    <div class="modal-screen">
      <div class="sideBar" id="sideBar">
        <div class="menuButton">
          <h2>Menu</h2>
          <button onclick="disappear()">x</button>
        </div>

        <button>Best Seller</button>
        <button>Comparison</button>
        <button>Orders</button>
        <button>Categories</button>
      </div>
    </div>

<h1 style="margin-bottom: 60px; margin-top: 40px; margin-left: 20px;">Your Cart</h1>

<div class="cart-container">

    <div class="cart-items">

        <div class="cart-item">
            <div class="product">
             <image src="https://picsum.photos/150/150" class="image"></image>
                <div class="details">
                    <h3>Product Name</h3>
                    <br>
                    <p><strong>price:$120</strong></p>
                </div>
            </div>

            <div class="actions">
                <button>-</button>
                <span>1</span>
                <button>+</button>
                <button class="remove">Remove</button>
            </div>
        </div>
          <div class="cart-item">
            <div class="product">
             <image src="https://picsum.photos/150/150" class="image"></image>
                <div class="details">
                    <h3>Product Name</h3>
                    <br>
                    <p><strong>price:$120</strong></p>
                </div>
            </div>

            <div class="actions">
                <button>-</button>
                <span>1</span>
                <button>+</button>
                <button class="remove">Remove</button>
            </div>
        </div>

        <div class="cart-item">
            <div class="product">
                <image src="https://picsum.photos/150/150" class="image"></image>

                <div class="details">
                    <h3>Product Name</h3>
                    <br>
                    <p><strong>price:$80</strong></p>
                </div>
            </div>

            <div class="actions">
                <button>-</button>
                <span>1</span>
                <button>+</button>
                <button class="remove">Remove</button>
            </div>
        </div>

    </div>

    <div class="summary">

        <h2>Order Summary</h2>

        <p>Subtotal: $200</p>
        <p>Shipping: $10</p>
        <p>Tax: $5</p>

        <h3>Total: $215</h3>

        <button class="checkout">Proceed to Checkout</button>

    </div>

</div>

<!-- footer -->
 <div id="main_footer">
        <div class="footer_column">
            <div class="foot_title">Get Help</div>
            <ul class="foot_li">
                <li class="foot_link">
                    <a href="support.com">Support</a>
                </li>
            </ul>
        </div>
        <div class="footer_column">
            <div class="foot_title">Know More About Us</div>
            <ul class="foot_li">
                <li class="foot_link">
                    <a href="aboutus.com">About Us</a>
                </li>
            </ul>
        </div>
        <div class="footer_column">
            <div class="foot_title">Join Us</div>
            <ul class="foot_li">
                <li class="foot_link">
                    <a href="Account.com">Your Account</a>
                </li>
                <li class="foot_link">
                    <a href="Orders.com">Your Orders</a>
                </li>
            </ul>
        </div>
    </div>
    <div class="afterFooter"></div>

</body>
<script src="index.js"></script>
<script src="script.js"></script>
</html>

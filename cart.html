            </div>
          </div>

          <div class="actions">
            <button class="minus">-</button>
            <span class="qty">1</span>
            <button class="plus">+</button>
            <button class="remove">Remove</button>
          </div>
        </div>
        <div class="cart-item">
          <div class="product">

              src="resources for cart page/5070.webp"

        </div>

        <div class="cart-item">

              <br />

            <span class="qty">1</span>
            <button class="plus">+</button>
            <button class="remove">Remove</button>
          </div>
        </div>
      </div>

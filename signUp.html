<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="Shared/favicon.ico" />
  </head>
  <body
    style="
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    "
  >
    <div class="signUp">
      <h1>Create Your Account</h1>
<form action="" style="display: contents;" id="signUp">
    <input type="text" placeholder="Full Name" required/>
      <input type="email" placeholder="Email Address"  required/>
      <input type="text" placeholder="Username"  required/>
      <input type="password" placeholder="Password" required  id="passwordInput"/>
      <input type="password" placeholder="Confirm Password"  required  id="confirmPasswordInput"/>
</form>
    
      <div class="terms">
        <input type="checkbox" />
        <p>I agree to the Terms of Service & Privacy Policy</p>
      </div>
<p style="font-weight: bold; font-size: 20px; display: none;" id="passwordConfirmation">test</p>
      <a href="#"  id="signUpButton"  onclick="signUpValidation()"   style="
          color: white;
          background-color: #472600;
          width: 80%;
          padding: 12.5px 30px;
           border-radius: 3rem;
    border: none;
    font-size: 20px;
    text-decoration: none;
    text-align: center;
        ">Create Account</a>
     

      <p>Or sign up with:</p>
      <div class="hyperLinks">
        <a href="#"
          ><img src="resources for Sign up In page/facebook.png" alt=""
        /></a>
        <a href="#"
          ><img src="resources for Sign up In page/google icon.png" alt=""
        /></a>
      </div>
      <div class="sign">
        <p>Already have an account?</p>
        <a
          href="signIn.html"
          style="
            font-weight: 700;
            text-decoration: none;
            color: black;
            font-size: 18px;
          "
          >Sign In</a
        >
      </div>
      <a class="returnHome" href="index.html" > Return to home page</a>
    </div>
  </body>
  <script src="index.js"></script>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="Shared/favicon.ico" />
  </head>
  <body
    style="
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    "
  >
    <div class="signUp">
      <h1>Create Your Account</h1>

      <input type="text" placeholder="Full Name" />
      <input type="email" placeholder="Email Address" />
      <input type="text" placeholder="Username" />
      <input type="password" placeholder="Password" />
      <input type="password" placeholder="Confirm Password" />
      <div class="terms">
        <input type="checkbox" />
        <p>I agree to the Terms of Service & Privacy Policy</p>
      </div>

      <a href="index.html"         style="
          color: white;
          background-color: #472600;
          width: 80%;
          padding: 12.5px 30px;
           border-radius: 3rem;
    border: none;
    font-size: 20px;
    text-decoration: none;
    text-align: center;
        ">Create Account</a>
     

      <p>Or sign up with:</p>
      <div class="hyperLinks">
        <a href="#"
          ><img src="resources for Sign up In page/facebook.png" alt=""
        /></a>
        <a href="#"
          ><img src="resources for Sign up In page/google icon.png" alt=""
        /></a>
      </div>
      <div class="sign">
        <p>Already have an account?</p>
        <a
          href="signIn.html"
          style="
            font-weight: 700;
            text-decoration: none;
            color: black;
            font-size: 18px;
          "
          >Sign In</a
        >
      </div>
      <a class="returnHome" href="index.html" > Return to home page</a>
    </div>
  </body>
</html>

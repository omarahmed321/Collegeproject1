<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="styleme.css">
    <title>Seller Page</title>
</head>
<body>

  <header class="nav">
    <div class="header-left">
     <button id="hamburger" class="general-btn noback-btn">≡</button>

     <img class="nav-img" src="attachments/logo.png">
   </div>
      <div class="-center">
          <input type="text" class="search-bar" placeholder="Search products brands and categories">
      </div>

      <div class="header-right">
          <button class="general-btn">Sign in/Up</button>
          <button class="general-btn">Account</button>
          <button class="general-btn">Cart</button>
      </div>
 
  </header>

  <div class="seller-id">
    <img src="https://picsum.photos/150/150" alt="seller profile picture">
    <p id="seller-name">Seller Name</p>
  </div> 


  <div class="seller-stats">
  <div class="small-box">
    <p class="small-box-title">Seller Rating</p>
    <div class="rating">
      <p class="rating-number">3.1</p>
      <p class="rating-stars">★★</p>
    </div>
    <p class="small-box-footer">69% Positive Ratings</p>
  </div>

  <div>
  <div class="small-box">
    <p class="small-box-title">Customers</p>  
      <p class="rating-number">7K+</p>
    <p class="small-box-footer">During the last 69 days!</p>
  </div>
</div>
</div>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="Shared/favicon.ico" />
  </head>
  <body
    style="
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    "
  >
    <div class="signIn">
      <h1 style="font-size: 40px">Sign In</h1>
      <form action="" style="display: contents" id="signIn">
        <input
          type="text"
          placeholder="Email or Username"
          id="emailOrUserSignIn" required
        />
        <input type="password" placeholder="Password" id="passwordSignIn"  required/>
      </form>

      <div class="row1" style="display: flex; flex-direction: row; width: 80%">
        <input type="checkbox" style="width: 5%; height: 15px" /> Remember Me
        <a
          href="#"
          style="
            margin-left: auto;
            font-weight: 700;
            text-decoration: none;
            color: black;
            font-size: 18px;
          "
          >Forget Password?</a
        >
      </div>

      <a
    id="signInButton"
        href="#"
        style="
          color: white;
          background-color: #472600;
          width: 80%;
          padding: 12.5px 30px;
          border-radius: 3rem;
          font-size: 20px;
          text-decoration: none;
          display: inline-block;
          text-align: center;
       
       "
       onclick="validationSignin()"
      >
        Sign In
      </a>

      <p>Or sign in with :</p>

      <div class="hLinks">
        <a href=""
          ><img src="resources for Sign up In page/facebook.png" alt=""
        /></a>
        <a href=""
          ><img src="resources for Sign up In page/google icon.png" alt=""
        /></a>
      </div>
      <div class="newUser">
        <p>New user?</p>
        <a
          href="signUp.html"
          style="
            font-weight: 700;
            text-decoration: none;
            color: black;
            font-size: 18px;
          "
          >Create an Account</a
        >
      </div>

      <a class="returnHome" href="index.html"> Return to home page</a>
    </div>
  </body>
  <script src="index.js"></script>
</html>
